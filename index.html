<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa de Sonido — Visor 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0f; color: #e8e6e0; font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }
    #ui { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; z-index: 5; padding: 20px; display: none; justify-content: space-between; align-items: flex-start; }
    .ui-panel { pointer-events: all; background: rgba(13,13,15,0.78); backdrop-filter: blur(12px); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; }
    .model-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .model-hint { font-size: 12px; color: #666; }
    .controls-panel { display: flex; flex-direction: column; gap: 8px; min-width: 190px; }
    .ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ctrl-label { font-size: 12px; color: #888; }
    .ctrl-value { font-size: 12px; color: #a8a3ff; min-width: 36px; text-align: right; }
    input[type=range] { -webkit-appearance: none; width: 90px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.12); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #6c63ff; cursor: pointer; }
    .ctrl-divider { height: 0.5px; background: rgba(255,255,255,0.08); margin: 2px 0; }
    .ctrl-btn { width: 100%; padding: 6px 10px; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 6px; color: #aaa; font-size: 12px; cursor: pointer; text-align: left; }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: #e8e6e0; }
    #hints { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5; display: none; gap: 14px; pointer-events: none; }
    .hint-chip { background: rgba(13,13,15,0.72); backdrop-filter: blur(10px); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: #666; white-space: nowrap; }
    .hint-chip span { color: #aaa; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(13,13,15,0.95); z-index: 15; flex-direction: column; gap: 14px; }
    #loading.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 2.5px solid rgba(108,99,255,0.2); border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #888; }
    #error-box { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; background: rgba(13,13,15,0.95); z-index: 20; }
    #error-box.visible { display: flex; }
    .error-icon { font-size: 40px; }
    .error-msg { font-size: 14px; color: #ff8080; text-align: center; max-width: 340px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="canvas-container">
  <div id="loading"><div class="spinner"></div><p class="loading-text">Cargando habitación…</p></div>
  <div id="error-box"><div class="error-icon">⚠️</div><p class="error-msg" id="error-msg">No se pudo cargar el modelo.</p></div>
  <div id="ui">
    <div class="ui-panel"><p class="model-name">Casa de Sonido</p><p class="model-hint">Modelo 3D interactivo</p></div>
    <div class="ui-panel controls-panel">
      <div class="ctrl-row"><span class="ctrl-label">Exposición</span><input type="range" id="exposure" min="0.2" max="3" step="0.05" value="1.2" /><span class="ctrl-value" id="exposure-val">1.2</span></div>
      <div class="ctrl-row"><span class="ctrl-label">Luz ambiental</span><input type="range" id="ambient" min="0" max="3" step="0.05" value="0.8" /><span class="ctrl-value" id="ambient-val">0.8</span></div>
      <div class="ctrl-row"><span class="ctrl-label">Brillo fondo</span><input type="range" id="bg-bright" min="0" max="1" step="0.05" value="0.05" /><span class="ctrl-value" id="bg-val">0.05</span></div>
      <div class="ctrl-divider"></div>
      <button class="ctrl-btn" id="btn-wireframe">◻ Modo wireframe</button>
      <button class="ctrl-btn" id="btn-reset">↺ Centrar cámara</button>
      <button class="ctrl-btn" id="btn-auto">▶ Auto-rotación: OFF</button>
    </div>
  </div>
  <div id="hints">
    <div class="hint-chip"><span>Clic + arrastrar</span> — rotar</div>
    <div class="hint-chip"><span>Clic derecho + arrastrar</span> — desplazar</div>
    <div class="hint-chip"><span>Scroll</span> — zoom</div>
  </div>
</div>
<script type="module">
import * as THREE from './three.module.js';
import { OrbitControls } from './OrbitControls.js';
import { GLTFLoader } from './GLTFLoader.js';
import { DRACOLoader } from './DRACOLoader.js';

const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111113);
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(3, 2, 5);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xfff5e0, 2.0);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.setScalar(2048);
dirLight.shadow.bias = -0.001;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xd0e8ff, 0.5);
fillLight.position.set(-4, 3, -4);
scene.add(fillLight);

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('./draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let currentModel = null, wireframeMode = false, autoRotate = false;

function loadModel(url) {
  document.getElementById('loading').classList.remove('hidden');
  gltfLoader.load(url, (gltf) => {
    currentModel = gltf.scene;
    currentModel.traverse(obj => { if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; } });
    scene.add(currentModel);
    fitCameraToModel(currentModel);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('ui').style.display = 'flex';
    document.getElementById('hints').style.display = 'flex';
  }, (xhr) => {
    if (xhr.total) document.querySelector('.loading-text').textContent = `Cargando… ${Math.round(xhr.loaded/xhr.total*100)}%`;
  }, (err) => {
    console.error(err);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-box').classList.add('visible');
  });
}

function fitCameraToModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = Math.abs(maxDim / 2 / Math.tan(camera.fov * Math.PI / 360)) * 1.6;
  camera.position.set(center.x + dist*0.6, center.y + dist*0.4, center.z + dist);
  controls.target.copy(center);
  controls.minDistance = maxDim * 0.05;
  controls.maxDistance = maxDim * 10;
  camera.near = maxDim * 0.001;
  camera.far = maxDim * 50;
  camera.updateProjectionMatrix();
  controls.update();
  dirLight.position.set(center.x + maxDim, center.y + maxDim*1.5, center.z + maxDim);
  dirLight.shadow.camera.left = -maxDim*2; dirLight.shadow.camera.right = maxDim*2;
  dirLight.shadow.camera.top = maxDim*2; dirLight.shadow.camera.bottom = -maxDim*2;
  dirLight.shadow.camera.far = maxDim*10; dirLight.shadow.camera.updateProjectionMatrix();
}

document.getElementById('exposure').addEventListener('input', (e) => { renderer.toneMappingExposure = parseFloat(e.target.value); document.getElementById('exposure-val').textContent = e.target.value; });
document.getElementById('ambient').addEventListener('input', (e) => { ambientLight.intensity = parseFloat(e.target.value); document.getElementById('ambient-val').textContent = e.target.value; });
document.getElementById('bg-bright').addEventListener('input', (e) => { const v = parseFloat(e.target.value); scene.background = new THREE.Color(v*0.95, v*0.95, v); document.getElementById('bg-val').textContent = v.toFixed(2); });
document.getElementById('btn-wireframe').addEventListener('click', () => { wireframeMode = !wireframeMode; if (currentModel) currentModel.traverse(obj => { if (obj.isMesh) { const mats = Array.isArray(obj.material) ? obj.material : [obj.material]; mats.forEach(m => m.wireframe = wireframeMode); } }); document.getElementById('btn-wireframe').textContent = wireframeMode ? '■ Modo normal' : '◻ Modo wireframe'; });
document.getElementById('btn-reset').addEventListener('click', () => { if (currentModel) fitCameraToModel(currentModel); });
document.getElementById('btn-auto').addEventListener('click', () => { autoRotate = !autoRotate; controls.autoRotate = autoRotate; document.getElementById('btn-auto').textContent = autoRotate ? '⏸ Auto-rotación: ON' : '▶ Auto-rotación: OFF'; });

window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

(function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();

loadModel('Casa%20de%20sonido%20lowpoly.glb');
</script>
</body>
</html>
